   check_error:
       "check_exit_codes":
              method: "kill"
              message: "MPI Init error glogin"
              file: stdout 
              frequency: 15 
       "lookup table overflow":
              method: "kill"
              message: "lookup table overflow"
              file: stdout 
              frequency: 15 
       "SIGTERM":
              method: "kill"
              message: "SIGTERM found in stdout"
              file: stdout 
              frequency: 15 
       "FINISH called":
              method: "kill"
              message: "netcdf error found in stdout"
              file: stdout 
              frequency: 15 
       "netcdf error":
              method: "kill"
              message: "netcdf error found in stdout"
              file: stdout 
              frequency: 15 
       "BAD TERMINATION":
              method: "kill"
