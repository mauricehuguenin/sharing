# uncomment to write coupling fields to disc, slow but helpful for debugging the coupling
oasis3mct:
#   export_mode_a2o: "EXPOUT"
#   export_mode: "EXPOUT"
   debug_level: 0

foci:
   model_dir: ${general.homedir}/esm/models/foci-mops_oasismct4/

echam:
   # the brute-force approach to the hostfile_srun missing / empty file
   # pre_run_commands: "cp -f ~/FOCILMU-SW231_hostfile_srun ${work_dir}/hostfile_srun"
   #
   postprocessingscript: "echam_postprocessing.sh"
   namelist_dir: "${general.esm_namelist_dir}/echam/${version}/cmip6"
   # all ssp* scenarios use historical forcing before 2015, i.e. the setting   # scenario: "cmip6hist" and # scenario: "ssp???" produce the same results 
   # until year 2014
   # available scenarios: 1percCO2, ssp126, ssp245, ssp370, ssp585, ssp585os
   # technically tested: cmip6hist, ssp370 and ssp585
   # seb-wahl, 2021-08-11
   scenario: "cmip6hist"
#   scenario: "ssp370" # hmaurice: trying this to avoid crash in 2014
   allow_hist2ssp_transition: True
   resolution: "T63"
   # operational settings: yearly restarts
   restart_rate: ${general.nmonth}
   restart_unit: "months"
   # test settings, daily restarts
   # restart_rate: ${general.nday}
   # restart_unit: "days"
   nproca: 24
   nprocb: 24
   nprocio: 12
   # set's the namelist parameters, and links the correct 
   # carbon_emission.nc file
   with_lco2_emis: True
   namelist_changes:
      namelist.echam:
         runctl:
            lcouple_co2: True
            default_output: False
            ltdiag: True
         radctl:
                 iaero: 8
                 ighg: 1
                 io3: 4
                 isolrad: 1
                 ico2: 1
                 ich4: 4
                 in2o: 4
                 icfc: 4
         submodelctl:
            lco2: True
            lmethox: True
         parctl:
            iomode: 2
            nprocio: ${nprocio}
         co2ctl:
               lco2_emis: True
               lco2_2perc: True
nemo:
   pre_run_commands: "cp -f ~/srun_hostfile_template ${work_dir}/hostfile_srun"
   resolution: "ORCA05"
   # overwrite default time step of 1800s 
   time_step: 1200 #2160
   version: "ORCA05_LIM2_FOCI_MOPS_OASISMCT4"
   jpni: 28
   jpnj: 24
   nproc: 672 
   # jpni and jpnj are 0 by default, i.e. automatic distribution on CPUs
   # alkalinity masks
   namelist_changes:
      namelist_top_cfg:
         namtrc_rad:
            ln_trcrad: False
         namtrc:
            ln_trcdta: False
         namtrc_trd:
            ln_trdtrc(1): FALSE # AGE,	Age tracer
            ln_trdtrc(2): FALSE # PO4,	phosphate
            ln_trdtrc(3): FALSE # DOP,	dissolved organic particles
            ln_trdtrc(4): FALSE # O2,	Oxygen
            ln_trdtrc(5): FALSE # PHY,	Phytoplankton
            ln_trdtrc(6): FALSE # ZOO, 	Zooplankton
            ln_trdtrc(7): FALSE # DET,	Detritus
            ln_trdtrc(8): FALSE # DIN,	Dissolved inorganic Nitrogen
            ln_trdtrc(9): FALSE # DIC,	Dissolved organic carbon
            ln_trdtrc(10): FALSE # ALK,	Alkalinity
            ln_trdtrc(11): FALSE # IDEAL,	Ideal age tracer?
            #ln_alk: false
   #forcing_dir: /scratch/usr/shktkeme/foci_input/alk_mask/CoastEU/
   #forcing_sources:
      #alkalinity: ${forcing_dir}/alkalinity_mask_y@YEAR@.nc
   #forcing_files:
      #alkalinity: alkalinity
   
xios:
   nproc: 12
