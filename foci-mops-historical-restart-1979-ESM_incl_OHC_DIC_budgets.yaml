   ini_parent_date: "19791231"
   ini_nemo_restart_steps: 01899240 #02396000
#  ini_parent_dir: "/mnt/vast-nhr/home/shkmazel/esm/esm-experiments/${ini_parent_exp_id}/restart"
   ini_parent_dir: "/mnt/ceph-hdd/cold/shk00066/u22046/EddiesHC_input/restart1979"
